name: DartPose
options:
  bundleIdPrefix: com.godkisung
  deploymentTarget:
    iOS: "17.0"

# SPM 패키지 주소 선언
packages:
  SwiftTasksVision:
    url: https://github.com/paescebu/SwiftTasksVision
    from: 0.10.14

targets:
  DartPose:
    type: application
    platform: iOS
    sources:
      - path: DartPose
    
    # 패키지 자동 연결!
    dependencies:
      - package: SwiftTasksVision
        
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES   # 🎯 에러 해결: Info.plist 자동 생성으로 변경!
        PRODUCT_BUNDLE_IDENTIFIER: com.godkisung.DartPose
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/Frameworks
        SWIFT_VERSION: 5.0
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"