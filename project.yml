# XcodeGen 프로젝트 정의
# `xcodegen generate` 명령어로 .xcodeproj 생성
name: DartPose

options:
  bundleIdPrefix: com.dartpose
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  DartPose:
    type: application
    platform: iOS
    sources:
      - DartPose
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "다트 투구 영상을 불러오기 위해 사진 라이브러리 접근이 필요합니다."
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"  # iPhone만

  DartPoseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DartPoseTests
    dependencies:
      - target: DartPose
    settings:
      base:
        SWIFT_VERSION: "5.9"
